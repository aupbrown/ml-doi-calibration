data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits:
    train: 0.7
    val: 0.15
    test: 0.15
  seed: 42

model:
  type: xgboost  # Options: xgboost, mlp

  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    objective: reg:squarederror
    eval_metric: rmse
    early_stopping_rounds: 20

  mlp:
    hidden_dims: [256, 128, 64]
    activation: relu
    dropout: 0.2
    batch_norm: true

training:
  epochs: 100
  batch_size: 512
  optimizer: adam
  lr: 1.0e-3
  scheduler:
    type: cosine
    eta_min: 1.0e-6
  device: cpu  # Options: cpu, cuda, mps

logging:
  use_wandb: false
  project: pet-doi-ml
  entity: null

output:
  results_dir: results
  validation_dir: results/validation
  processed_dir: data/processed
  save_model: true

ingest:
  data_dir: data/CZT_0.5mmSlit_CS137_thr_1150_A16-22_C1-8_B-600V_S-80V_scan_4min_duration_8mm_step_41steps_L_2000_T-A21_Steering_chan_3_Parallel_to_anode_motor_1_centered
  chunk_size: 500
  step_indices: null  # null = process all 41 motor-position files

emulation:
  trigger_threshold_fraction: 0.10  # fraction of shaped peak used for leading-edge trigger
  trigger_skip_samples: 10          # samples at waveform start skipped before trigger search
  peak_search_window_samples: 50    # samples after trigger to search for peak amplitude
  adc_scale: null                   # null = auto-fit from 99th percentile of first chunk
