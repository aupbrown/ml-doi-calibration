name: Feature Request
description: Propose new functionality or an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem and your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem or limitation are you trying to address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach or feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered and why you prefer this one.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: References, related papers, or other context that supports this request.
